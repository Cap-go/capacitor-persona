<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-intune Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>@capgo/capacitor-intune</h1>
      <p class="lead">Exercise Intune MAM enrollment, policy, app config, and MSAL flows from the local linked plugin.</p>

      <label for="scopes">Scopes (JSON array)</label>
      <textarea id="scopes" rows="3">["https://graph.microsoft.com/.default"]</textarea>

      <label for="login-hint">Login hint (optional)</label>
      <input id="login-hint" type="text" placeholder="alex@example.com" />

      <label for="account-id">Account ID</label>
      <input id="account-id" type="text" placeholder="Filled after sign-in" />

      <div class="actions">
        <button id="acquire-token">Acquire token</button>
        <button id="acquire-token-silent">Acquire token silently</button>
      </div>

      <div class="actions">
        <button id="register-enroll">Register and enroll</button>
        <button id="login-enroll">Login and enroll</button>
      </div>

      <div class="actions">
        <button id="enrolled-account">Enrolled account</button>
        <button id="app-config">App config</button>
        <button id="policy">Policy</button>
      </div>

      <div class="actions">
        <button id="group-name">Group name</button>
        <button id="sdk-version">SDK version</button>
        <button id="diagnostics">Diagnostics</button>
      </div>

      <div class="actions">
        <button id="logout">Logout</button>
        <button id="deregister">Deregister and unenroll</button>
      </div>

      <pre id="plugin-output">Configure native Intune/MSAL settings, then use the buttons above.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
